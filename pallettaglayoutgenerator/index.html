<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pallet Tag Generator</title>
    
    <!-- 1. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 3. Babel (for JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Font: Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        // --- Icons ---
        const IconPrinter = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
        );
        const IconQrCode = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><path d="M3 14h7v7H3z"></path></svg>
        );
        const IconType = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg>
        );
        const IconFileText = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        );
        const IconExternalLink = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
        );

        // --- Main Component ---
        function App() {
            const [itemCode, setItemCode] = React.useState('PART-12345-X');
            const [itemName, setItemName] = React.useState('รายละเอียดสินค้า (Item Name)');
            
            const qrCodeUrl = `https://api.qrserver.com/v1/create-qr-code/?size=1000x1000&data=${encodeURIComponent(itemCode)}`;

            const handlePrintWindow = () => {
                const safeFilename = itemCode.replace(/[^a-zA-Z0-9-_]/g, '-');
                const pageTitle = `${safeFilename}_PalletTAG`;
                const printContent = document.getElementById('printable-content');

                if (!printContent) {
                    alert("ไม่พบเนื้อหาที่จะพิมพ์");
                    return;
                }

                const printWindow = window.open('', '_blank', 'width=1123,height=794');
                
                if (!printWindow) {
                    alert("กรุณาอนุญาต Pop-up (บล็อกเกอร์) ที่แถบ URL ด้านบน เพื่อให้สั่งพิมพ์ได้");
                    return;
                }

                printWindow.document.open();
                printWindow.document.write(`
                <!DOCTYPE html>
                <html>
                    <head>
                    <title>${pageTitle}</title>
                    <script src="https://cdn.tailwindcss.com"><\/script>
                    <style>
                        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap');
                        
                        body { 
                            margin: 0; 
                            padding: 0; 
                            background-color: #f3f4f6;
                            -webkit-print-color-adjust: exact; 
                            print-color-adjust: exact;
                            display: flex;
                            flex-direction: column;
                            align-items: center;
                            min-height: 100vh;
                        }

                        @page { 
                            size: A4 landscape; 
                            margin: 0; 
                        }

                        .font-sarabun { font-family: 'Sarabun', sans-serif; }
                        .b-thick { border: 3px solid black; }
                        .b-right { border-right: 3px solid black; }
                        .b-bottom { border-bottom: 3px solid black; }
                        .b-top { border-top: 3px solid black; }
                        .rev-table { width: 100%; border-collapse: collapse; height: 100%; }
                        .rev-table th, .rev-table td { border: 2px solid black; padding: 8px; text-align: center; }
                        .rev-table th { background-color: #f3f4f6; font-weight: 800; text-transform: uppercase; }
                        
                        @media print {
                            body {
                                background-color: white;
                                display: block;
                            }
                            .no-print { display: none !important; }
                            .paper-container {
                                box-shadow: none !important;
                                margin: 0 !important;
                                width: 100% !important;
                                height: 100% !important;
                            }
                            .helper-bar { display: none !important; }
                        }

                        .helper-bar {
                            width: 100%;
                            background-color: #2563eb;
                            color: white;
                            padding: 15px;
                            text-align: center;
                            font-family: sans-serif;
                            display: flex;
                            justify-content: space-between;
                            align-items: center;
                            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
                            margin-bottom: 20px;
                            position: sticky;
                            top: 0;
                            z-index: 50;
                        }
                        .btn-print {
                            background-color: white;
                            color: #2563eb;
                            border: none;
                            padding: 8px 16px;
                            border-radius: 4px;
                            font-weight: bold;
                            cursor: pointer;
                            font-size: 14px;
                            transition: background-color 0.2s;
                        }
                        .btn-print:hover { background-color: #eff6ff; }
                    </style>
                    </head>
                    <body>
                    <div class="helper-bar no-print">
                        <div style="text-align: left;">
                            <div style="font-weight: bold; font-size: 18px;">ขั้นตอนการบันทึก PDF / พิมพ์:</div>
                            <div style="font-size: 14px; opacity: 0.9;">1. เลือกปลายทาง (Printer) เป็น <strong>"Save as PDF"</strong><br>2. กดปุ่ม Save เพื่อบันทึกไฟล์</div>
                        </div>
                        <button onclick="window.print()" class="btn-print">🖨️ สั่งพิมพ์ / Save PDF</button>
                    </div>
                    <div class="paper-container" style="background: white; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); width: 297mm; height: 210mm; position: relative; overflow: hidden;">
                        ${printContent.innerHTML}
                    </div>
                    <script>
                        window.onload = function() {
                        setTimeout(function() {
                            window.focus();
                            window.print();
                        }, 1000);
                        };
                    <\/script>
                    </body>
                </html>
                `);
                printWindow.document.close();
            };

            return (
                <div className="flex flex-col font-sans min-h-screen">
                    {/* Navbar */}
                    <nav className="bg-gray-900 text-white p-4 shadow-md no-print flex justify-between items-center z-50 relative">
                        <div className="flex items-center gap-2">
                            <IconQrCode />
                            <h1 className="text-xl font-bold">Pallet Tag Generator</h1>
                        </div>
                        <div className="flex gap-3">
                            <button 
                                onClick={handlePrintWindow}
                                className="bg-green-600 hover:bg-green-500 text-white px-6 py-2 rounded-lg font-bold flex items-center gap-2 transition-colors shadow-lg cursor-pointer active:scale-95 border border-green-700"
                            >
                                <IconPrinter />
                                <span>เปิดหน้าต่างพิมพ์ / Save PDF</span>
                            </button>
                        </div>
                    </nav>

                    <div className="flex-1 flex flex-col md:flex-row overflow-hidden relative z-0" style={{height: 'calc(100vh - 64px)'}}>
                        {/* Sidebar */}
                        <aside className="w-full md:w-80 bg-white shadow-xl z-10 overflow-y-auto border-r border-gray-200">
                            <div className="p-6 space-y-8">
                                <div>
                                    <h2 className="text-lg font-bold text-gray-800 border-b pb-2 mb-4">ข้อมูลสำหรับพิมพ์ (2 ช่อง)</h2>
                                    <div className="mb-4">
                                        <label className="block text-sm font-bold text-gray-700 mb-1">1. ITEM CODE (QR)</label>
                                        <div className="relative flex items-center">
                                            <div className="absolute left-3 text-gray-400"><IconType /></div>
                                            <input 
                                                type="text" 
                                                value={itemCode}
                                                onChange={(e) => setItemCode(e.target.value)}
                                                className="w-full border-2 border-gray-300 rounded-lg pl-10 pr-3 py-2 focus:border-blue-500 focus:ring-0 outline-none font-bold text-lg"
                                                placeholder="ระบุรหัสสินค้า"
                                            />
                                        </div>
                                        <p className="text-xs text-blue-600 mt-1">*ข้อมูลนี้จะถูกนำไปสร้าง QR Code ด้วย</p>
                                    </div>

                                    <div className="mb-4">
                                        <label className="block text-sm font-bold text-gray-700 mb-1">2. Item Name (ชื่อสินค้า)</label>
                                        <div className="relative flex items-start">
                                            <div className="absolute left-3 top-3 text-gray-400"><IconFileText /></div>
                                            <textarea 
                                                value={itemName}
                                                onChange={(e) => setItemName(e.target.value)}
                                                rows={3}
                                                className="w-full border-2 border-gray-300 rounded-lg pl-10 pr-3 py-2 focus:border-blue-500 focus:ring-0 outline-none"
                                                placeholder="ระบุชื่อสินค้า"
                                            />
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-blue-50 p-4 rounded-md border border-blue-200 text-sm text-blue-800 flex items-start gap-2">
                                    <div className="mt-1"><IconExternalLink /></div>
                                    <div>
                                        <strong>คำแนะนำ:</strong> <br/>
                                        ระบบใช้ <strong>Pop-up Window</strong> ในการพิมพ์<br/>
                                        หากกดแล้วไม่มีอะไรเกิดขึ้น ให้กดอนุญาต Pop-up ที่แถบ URL ด้านบนครับ
                                    </div>
                                </div>
                            </div>
                        </aside>

                        {/* Preview Area */}
                        <main className="flex-1 bg-gray-600 p-8 overflow-auto flex justify-center items-start">
                            <div 
                                id="printable-content"
                                className="bg-white shadow-2xl font-sarabun" 
                                style={{ width: '297mm', height: '210mm', minWidth: '297mm', minHeight: '210mm', position: 'relative' }}
                            >
                                <style>{`
                                    .font-sarabun { font-family: 'Sarabun', sans-serif; }
                                    .b-thick { border: 3px solid black; }
                                    .b-right { border-right: 3px solid black; }
                                    .b-bottom { border-bottom: 3px solid black; }
                                    .b-top { border-top: 3px solid black; }
                                    .rev-table { width: 100%; border-collapse: collapse; height: 100%; }
                                    .rev-table th, .rev-table td { border: 2px solid black; padding: 8px; text-align: center; }
                                    .rev-table th { background-color: #f3f4f6; font-weight: 800; text-transform: uppercase; }
                                `}</style>
                                
                                <div className="w-full h-full p-8 flex flex-col box-border">
                                    <div className="flex-1 border-[4px] border-black flex flex-col p-1 relative">
                                        
                                        {/* ROW 1: ITEM INFO + QR (Height 45%) */}
                                        <div className="flex b-bottom h-[45%]">
                                            <div className="w-[25%] b-right p-2 flex flex-col items-center justify-center">
                                                <img 
                                                    src={qrCodeUrl} 
                                                    alt="QR Code" 
                                                    className="w-full h-auto object-contain max-h-[90%]"
                                                />
                                            </div>
                                            <div className="w-[75%] flex flex-col">
                                                <div className="h-1/2 b-bottom p-4 relative flex flex-col justify-center">
                                                    <div className="absolute top-2 left-3 text-sm font-bold uppercase text-gray-500 tracking-wider">ITEM CODE</div>
                                                    <div className="text-[80px] leading-none font-bold text-black tracking-tight overflow-hidden whitespace-nowrap mt-4 pl-4">
                                                        {itemCode}
                                                    </div>
                                                </div>
                                                <div className="h-1/2 p-4 relative flex items-center">
                                                    <div className="absolute top-2 left-3 text-xs font-bold uppercase text-gray-400 tracking-wider">Item Name</div>
                                                    <div className="text-4xl font-bold leading-tight line-clamp-3 w-full pl-4 pt-2">
                                                        {itemName}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* ROW 2: LOT & LOCATOR (Expanded Height to 35%) */}
                                        <div className="flex b-bottom h-[35%]">
                                            <div className="w-1/2 b-right p-4 relative">
                                                <div className="text-xl font-bold uppercase text-gray-600">LOT#</div>
                                            </div>
                                            <div className="w-1/2 p-4 relative flex flex-col justify-between">
                                                <div className="text-xl font-bold uppercase text-gray-600">LOCATOR#</div>
                                                <div className="flex items-end justify-center pb-2">
                                                    <span className="text-4xl font-bold mr-6">PIA -</span>
                                                    <div className="flex-1"></div>
                                                    <span className="text-4xl font-bold ml-6">224-G</span>
                                                </div>
                                            </div>
                                        </div>

                                        {/* ROW 3: REV TABLE (Remaining Height, Reduced Rows) */}
                                        <div className="flex flex-1">
                                            <div className="w-full p-4 flex flex-col">
                                                <table className="rev-table">
                                                    <thead>
                                                        <tr>
                                                            <th className="w-[20%] text-xl">REV#</th>
                                                            <th className="w-[20%] text-xl">QTY.</th>
                                                            <th className="w-[20%] text-xl">DATE</th>
                                                            <th className="w-[40%] text-xl">NOTE</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {[0, 1].map((rev) => (
                                                            <tr key={rev}>
                                                                <td className="font-bold text-left pl-6 text-xl">Rev# {rev}</td>
                                                                <td></td>
                                                                <td></td>
                                                                <td></td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
